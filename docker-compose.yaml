services:
  # =============================================================================
  # 前端服务 - 静态文件服务
  # =============================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-observability-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - openclaw-observability

  # =============================================================================
  # 数据库初始化容器 - 等待 Doris 就绪后创建数据库和表
  # =============================================================================
  db-init:
    image: mysql:8
    container_name: openclaw-observability-db-init
    restart: "no"
    volumes:
      - ./scripts/init-doris-schema.sql:/docker-entrypoint-initdb.d/init-doris-schema.sql:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "等待 Doris FE 就绪..."
        until mysql -h"$${DORIS_HOST:-doris}" -P"$${DORIS_PORT:-9030}" -uroot -e "SELECT 1" 2>/dev/null; do
          echo "等待中..."
          sleep 2
        done
        echo "Doris 已就绪，开始初始化..."
        mysql -h"$${DORIS_HOST:-doris}" -P"$${DORIS_PORT:-9030}" -uroot < /docker-entrypoint-initdb.d/init-doris-schema.sql
        echo "数据库初始化完成"
    environment:
      - DORIS_HOST=${DORIS_HOST:-doris}
      - DORIS_PORT=${DORIS_PORT:-9030}
    depends_on:
      doris:
        condition: service_healthy
    networks:
      - openclaw-observability

  # =============================================================================
  # API 服务 - Node.js 后端
  # =============================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: openclaw-observability-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8787}:8787"
    environment:
      - DORIS_HOST=${DORIS_HOST:-doris}
      - DORIS_PORT=${DORIS_PORT:-9030}
      - DORIS_USER=${DORIS_USER:-root}
      - DORIS_PASSWORD=${DORIS_PASSWORD:-}
      - DORIS_DATABASE=${DORIS_DATABASE:-otel}
      - PORT=8787
    depends_on:
      doris:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8787 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - openclaw-observability

  # =============================================================================
  # Apache Doris - All-in-One (FE + BE in single container)
  # =============================================================================
  doris:
    image: ${DORIS_IMAGE:-apache/doris:4.0.3-all-slim}
    container_name: doris
    hostname: doris
    restart: unless-stopped
    privileged: true
    ports:
      - "${DORIS_FE_HTTP_PORT:-8030}:8030"  # FE HTTP port (Web UI)
      - "${DORIS_FE_MYSQL_PORT:-9030}:9030"  # FE MySQL protocol port
      - "${DORIS_BE_HTTP_PORT:-8040}:8040"   # BE HTTP port
    environment:
      - SKIP_CHECK_ULIMIT=true
    volumes:
      - doris_data:/opt/apache-doris
    healthcheck:
      test: ["CMD-SHELL", "mysql -h 127.0.0.1 -P 9030 -uroot -e 'SHOW BACKENDS\\G' | grep -q 'Alive: true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s
    networks:
      - openclaw-observability

networks:
  openclaw-observability:
    driver: bridge

volumes:
  doris_data: